name: Render video

on:
  workflow_dispatch:
    inputs:
      composition:
        description: "Composition ID yang akan dirender"
        default: "HelloWorld"
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Remotion
        run: npx remotion browser ensure

      - name: Render video
        run: npx remotion render ${{ inputs.composition }} out/video.mp4

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.composition }}-video
          path: out/video.mp4
          if-no-files-found: error
